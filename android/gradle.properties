# Pin JDK 21 (LTS) — Kotlin 2.0.x cannot parse Java 26 version strings.
# Kotlin 2.0.21 uses JavaVersion.parse() which fails on "26.0.1".
# CI must also set JAVA_HOME to a JDK 21 installation.
org.gradle.java.home=/opt/homebrew/opt/openjdk@21

# Gradle JVM options
org.gradle.jvmargs=-Xmx2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# AndroidX + Kotlin
android.useAndroidX=true
kotlin.code.style=official
