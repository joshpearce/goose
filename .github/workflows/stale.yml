name: Stale

on:
  schedule:
    - cron: "43 7 * * *"

permissions: {}

jobs:
  stale:
    name: Mark and close stale issues and PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. If this is still relevant, please comment.
          stale-pr-message: >
            This pull request has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. Please rebase and update if you intend to continue.
          close-issue-message: "Closed due to inactivity. Reopen if still relevant."
          close-pr-message: "Closed due to inactivity. Reopen and rebase to continue."
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security"
