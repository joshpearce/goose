name: Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    name: Label pull request
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Apply labels
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
