name: Zizmor

# Static analysis of GitHub Actions workflow files for security vulnerabilities:
# script injection, excessive permissions, unpinned action refs, dangerous triggers.

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
  pull_request: {}
  workflow_dispatch:

permissions: {}

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6

  zizmor-gate:
    name: zizmor / gate
    needs: [zizmor]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          z="${{ needs.zizmor.result }}"
          if [[ "$z" == "failure" || "$z" == "cancelled" ]]; then
            echo "zizmor failed: $z" && exit 1
          fi
          echo "zizmor CI passed (result=$z)"
