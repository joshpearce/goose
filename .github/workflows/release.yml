name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-ipa:
    name: Build unsigned IPA
    runs-on: macos-latest
    outputs:
      ipa-name: ${{ steps.package.outputs.ipa-name }}
      ipa-size: ${{ steps.package.outputs.ipa-size }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build (no code signing)
        run: |
          xcodebuild \
            -project GooseSwift.xcodeproj \
            -scheme GooseSwift \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            -derivedDataPath build/DerivedData \
            build

      - name: Package as IPA
        id: package
        run: |
          APP=$(find build/DerivedData/Build/Products -name "GooseSwift.app" | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          IPA_NAME="GooseSwift-${{ github.ref_name }}-unsigned.ipa"
          zip -r "$IPA_NAME" Payload/
          IPA_SIZE=$(stat -f%z "$IPA_NAME")
          echo "ipa-name=$IPA_NAME" >> "$GITHUB_OUTPUT"
          echo "ipa-size=$IPA_SIZE" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: ${{ steps.package.outputs.ipa-name }}
          retention-days: 1

  release:
    name: Create GitHub Release and update AltStore source
    needs: build-ipa
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: ipa

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG}$" | tail -1)

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log "${TAG}" --pretty=format:"- %s" --no-merges | head -30)
          fi

          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release, attach IPA, and update AltStore source
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = context.ref.replace('refs/tags/', '');
            const notes = `${{ steps.notes.outputs.notes }}`;
            const ipaName = `${{ needs.build-ipa.outputs.ipa-name }}`;
            const ipaSize = parseInt(`${{ needs.build-ipa.outputs.ipa-size }}`);

            // 1. Create the GitHub Release
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: notes || 'No changes listed.',
              draft: false,
              prerelease: false,
            });

            // 2. Attach the unsigned IPA
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: ipaName,
              data: fs.readFileSync(ipaName),
            });

            const ipaURL = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}/${ipaName}`;

            // 3. Update altstore-source.json with the new version
            const sourceFile = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'altstore-source.json',
              ref: 'main',
            });

            const source = JSON.parse(Buffer.from(sourceFile.data.content, 'base64').toString());
            const app = source.apps[0];

            // Strip leading "v" for the semver version field
            const version = tag.replace(/^v/, '');
            const today = new Date().toISOString().split('T')[0];

            app.versions.unshift({
              version,
              date: today,
              localizedDescription: notes.split('\n').slice(0, 3).join('\n') || `Release ${tag}`,
              downloadURL: ipaURL,
              size: ipaSize,
            });

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'altstore-source.json',
              message: `chore(altstore): add ${tag} to source`,
              content: Buffer.from(JSON.stringify(source, null, 2) + '\n').toString('base64'),
              sha: sourceFile.data.sha,
            });

            core.info(`AltStore source updated with ${tag} → ${ipaURL}`);
