version: 2
updates:
  - package-ecosystem: cargo
    directory: /Rust/core
    schedule:
      interval: weekly
      day: monday
    cooldown:
      days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      days: 7

  - package-ecosystem: pip
    directory: /server/ingest
    schedule:
      interval: weekly
      day: monday
    cooldown:
      days: 7
